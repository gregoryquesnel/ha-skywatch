<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skywatch live map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background: #0b0e13;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    #map { width: 100%; height: 100%; }

    /* Plane marker — outer wrapper holds the rotated SVG + label */
    .plane-marker {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 60px;
    }
    .plane-icon {
      width: 28px;
      height: 28px;
      transform-origin: 50% 50%;
      filter: drop-shadow(0 0 4px rgba(0, 0, 0, 0.7));
    }
    .plane-icon svg { width: 28px; height: 28px; display: block; }
    .plane-label {
      font: 600 10px ui-monospace, "SF Mono", Menlo, monospace;
      color: #e0e6ed;
      background: rgba(11,14,19,0.65);
      padding: 0 3px;
      margin-top: 2px;
      border-radius: 2px;
      white-space: nowrap;
    }

    /* Altitude color ramp (helo override always amber) */
    .plane-icon.alt-low       svg { color: #ef5350; }  /* <10k ft */
    .plane-icon.alt-mid-low   svg { color: #ff9800; }  /* 10–20k */
    .plane-icon.alt-mid       svg { color: #ffeb3b; }  /* 20–30k */
    .plane-icon.alt-high      svg { color: #4fc3f7; }  /* 30–40k */
    .plane-icon.alt-very-high svg { color: #1976d2; }  /* 40k+ */
    .plane-icon.helo          svg { color: #ffb74d; }
    .plane-icon.watch         svg { color: #ab47bc; }

    /* Legend */
    #legend {
      position: absolute;
      top: 8px; right: 8px;
      z-index: 999;
      background: rgba(11,14,19,0.85);
      color: #aab4be;
      font: 10px ui-monospace, monospace;
      padding: 6px 8px;
      border-radius: 4px;
      pointer-events: none;
      line-height: 1.5;
    }
    #legend .ltitle {
      color: #e0e6ed;
      font-weight: 600;
      margin-bottom: 2px;
      letter-spacing: 0.3px;
    }
    #legend .ltitle:not(:first-child) { margin-top: 4px; }
    #legend .lrow { display: flex; align-items: center; gap: 6px; }
    #legend .sw {
      width: 10px; height: 10px;
      border-radius: 2px;
      display: inline-block;
    }
    #legend .ico {
      width: 14px; height: 14px;
      display: inline-flex; align-items: center; justify-content: center;
      color: #aab4be;
    }
    #legend .ico svg { width: 14px; height: 14px; }

    /* Recenter button — sits below the zoom controls */
    .leaflet-control.skywatch-recenter {
      background: rgba(11,14,19,0.85);
      color: #4fc3f7;
      border: 1px solid rgba(79,195,247,0.4);
      border-radius: 4px;
      width: 30px;
      height: 30px;
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    .leaflet-control.skywatch-recenter:hover {
      background: rgba(79,195,247,0.15);
      border-color: #4fc3f7;
    }

    /* Status badge */
    #status {
      position: absolute;
      top: 8px; left: 56px;
      z-index: 999;
      background: rgba(11,14,19,0.85);
      color: #aab4be;
      font: 11px ui-monospace, monospace;
      padding: 4px 8px;
      border-radius: 4px;
      pointer-events: none;
    }

    /* Tooltip styling */
    .leaflet-tooltip.sky-tip {
      background: rgba(11,14,19,0.92);
      color: #e0e6ed;
      border: 1px solid #4fc3f7;
      border-radius: 4px;
      font: 12px/1.4 system-ui, sans-serif;
      padding: 6px 8px;
    }
    .leaflet-tooltip.sky-tip .cs {
      font: 600 13px ui-monospace, monospace;
      color: #4fc3f7;
    }
    .leaflet-tooltip.sky-tip .alt { color: #aab4be; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="status">loading…</div>
  <div id="legend">
    <div class="ltitle">Altitude</div>
    <div class="lrow"><span class="sw" style="background:#1976d2"></span>40k+ ft</div>
    <div class="lrow"><span class="sw" style="background:#4fc3f7"></span>30–40k</div>
    <div class="lrow"><span class="sw" style="background:#ffeb3b"></span>20–30k</div>
    <div class="lrow"><span class="sw" style="background:#ff9800"></span>10–20k</div>
    <div class="lrow"><span class="sw" style="background:#ef5350"></span>&lt; 10k</div>
    <div class="lrow"><span class="sw" style="background:#ffb74d"></span>helo</div>
    <div class="lrow"><span class="sw" style="background:#ab47bc"></span>watch</div>
    <div class="ltitle">Aircraft</div>
    <div class="lrow"><span class="ico" id="leg-jet"></span>jet</div>
    <div class="lrow"><span class="ico" id="leg-turboprop"></span>turboprop</div>
    <div class="lrow"><span class="ico" id="leg-light-ga"></span>light GA</div>
    <div class="lrow"><span class="ico" id="leg-military"></span>military</div>
    <div class="lrow"><span class="ico" id="leg-helo"></span>helicopter</div>
  </div>

  <script>
    "use strict";

    const REFRESH_MS = 5000;
    const GEOJSON_URL = "/api/skywatch/flights.geojson";

    // 5 nose-up SVGs, fill="currentColor" so CSS altitude classes tint them.
    const JET_SVG = `<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 1 L13.5 11 L22 13.5 L22 15.5 L13.5 13.5 L13 19 L15 20.5 L15 22 L12 21 L9 22 L9 20.5 L11 19 L10.5 13.5 L2 15.5 L2 13.5 L10.5 11 Z"/></svg>`;
    const TURBOPROP_SVG = `<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M11.5 2 L12.5 2 L13 11 L13 19 L14.5 21 L14.5 22 L9.5 22 L9.5 21 L11 19 L11 11 Z"/><rect x="2" y="11" width="20" height="2" rx="0.5"/><circle cx="6" cy="12" r="1.6"/><circle cx="18" cy="12" r="1.6"/><rect x="8.5" y="18" width="7" height="1.5" rx="0.3"/></svg>`;
    const LIGHT_GA_SVG = `<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><ellipse cx="12" cy="14" rx="1.5" ry="6"/><rect x="3.5" y="10" width="17" height="1.6" rx="0.5"/><rect x="8.5" y="19" width="7" height="1.2" rx="0.3"/><rect x="11.5" y="17" width="1" height="3.5"/></svg>`;
    const MILITARY_SVG = `<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 1 L13 11 L22 17 L17 17 L13 14.5 L13 22 L11 22 L11 14.5 L7 17 L2 17 L11 11 Z"/></svg>`;
    const HELO_SVG = `<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><circle cx="12" cy="13" r="2.5"/><rect x="11" y="14" width="2" height="6" rx="0.5"/><rect x="11.5" y="13" width="1" height="9"/><rect x="2" y="7.5" width="20" height="1" rx="0.5"/><rect x="7" y="20" width="10" height="1" rx="0.5"/></svg>`;

    const CATEGORY_SVG = {
      jet: JET_SVG,
      turboprop: TURBOPROP_SVG,
      light_ga: LIGHT_GA_SVG,
      military: MILITARY_SVG,
      helo: HELO_SVG,
    };

    // Categorization fallback codes (server already provides is_helo + is_military).
    const TURBOPROP_CODES = new Set([
      "DH8A","DH8B","DH8C","DH8D","DHC6","DH8E",
      "AT43","AT45","AT46","AT72","AT75","AT76",
      "BE99","BE9L","BE9T","BE20","B190","B350","BE36",
      "C208","SF34","L410","PC12","JS41","JS31","JS32",
      "DO228","DO328","AN24","AN26","E110","CN35"
    ]);
    const LIGHT_GA_CODES = new Set([
      "C150","C152","C162","C170","C172","C175","C177","C180","C182","C185",
      "C188","C195","C206","C207","C210","C25A","C25B","C25C","C25M",
      "PA18","PA22","PA24","PA28","PA32","PA34","PA38","PA44","PA46",
      "M20J","M20K","M20P","M20T","M20U","M20V","M20R",
      "BE33","BE35","BE55","BE58","BE76","BE77",
      "SR20","SR22","SF50",
      "DA20","DA40","DA42","DA62",
      "TB10","TB20","TB21",
      "GLAS","LANC","RV6","RV7","RV8","RV9","RV10","RV12","RV14",
      "GROB","DR40"
    ]);

    function aircraftCategory(props) {
      // Priority: watch_slug → military → helo → turboprop → light_ga → jet.
      if (props.watch_slug) return "watch";
      if (props.is_military) return "military";
      if (props.is_helo) return "helo";
      const c = (props.aircraft_code || "").toUpperCase();
      if (TURBOPROP_CODES.has(c)) return "turboprop";
      if (LIGHT_GA_CODES.has(c)) return "light_ga";
      return "jet";
    }

    function altClass(altFt, category) {
      if (category === "watch") return "watch";
      if (category === "helo") return "helo";
      const a = Number(altFt) || 0;
      if (a < 10000) return "alt-low";
      if (a < 20000) return "alt-mid-low";
      if (a < 30000) return "alt-mid";
      if (a < 40000) return "alt-high";
      return "alt-very-high";
    }

    function svgForCategory(category) {
      if (category === "watch") return JET_SVG;  // watch can be any type; use jet as visual base
      return CATEGORY_SVG[category] || JET_SVG;
    }

    function tooltipHtml(p) {
      const cs = p.callsign || p.flight_number || "—";
      const route = (p.origin_iata || "?") + " → " + (p.destination_iata || "?");
      const ac = p.aircraft_code || p.aircraft_model || "";
      const fl = (p.altitude_ft != null) ? "FL" + Math.floor(p.altitude_ft / 100) : "";
      const sp = (p.ground_speed_kt != null) ? `${p.ground_speed_kt} kt` : "";
      const watch = p.watch_label ? `<div class="alt">⚑ ${p.watch_label}</div>` : "";
      return `<div class="cs">${cs}</div><div>${ac}</div><div class="alt">${fl} · ${sp}</div><div class="alt">${route}</div>${watch}`;
    }

    let map = null;
    let homeMarker = null;
    let radiusCircle = null;
    let audibleCircle = null;
    const tracks = new Map();  // flight_id → { marker, trailLine, color }

    function ensureMap(home, radiusM, audibleM) {
      if (map) return;
      map = L.map("map", { zoomControl: true, attributionControl: false })
              .setView([home[1], home[0]], 10);
      // Match ha-tinker exactly: dark_nolabels is significantly darker
      // than the default 'dark_matter' which renders nearly-light-grey
      // in rural regions (no roads to highlight). subdomains: 'abcd'
      // is required by CartoCDN per their docs.
      L.tileLayer(
        "https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png",
        {
          maxZoom: 19,
          subdomains: "abcd",
          attribution: "© OSM · © CARTO",
        }
      ).addTo(map);

      // Home + AOI ring
      homeMarker = L.marker([home[1], home[0]], {
        icon: L.divIcon({
          html: `<div style="font-size:18px;line-height:1;text-align:center;background:rgba(11,14,19,0.85);border:2px solid #4fc3f7;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;">🏠</div>`,
          iconSize: [28, 28],
          iconAnchor: [14, 14],
          className: ""
        }),
        interactive: false,
        zIndexOffset: -1000,
      }).addTo(map);
      radiusCircle = L.circle([home[1], home[0]], {
        radius: radiusM,
        color: "#4fc3f7",
        weight: 1,
        opacity: 0.4,
        dashArray: "4 6",
        fill: false,
      }).addTo(map);
      if (audibleM > 0) {
        audibleCircle = L.circle([home[1], home[0]], {
          radius: audibleM,
          color: "#ffd54f",
          weight: 1,
          opacity: 0.5,
          dashArray: "2 4",
          fill: false,
        }).addTo(map);
      }

      // Initial viewport: fit the entire AOI circle in view with a
      // small padding so edge aircraft markers don't get clipped.
      // Replaces the placeholder zoom 10 from setView() above.
      // This runs once (first ensureMap call) — subsequent ticks
      // never touch pan/zoom, so the user's interactive viewport is
      // preserved as they explore.
      map.fitBounds(radiusCircle.getBounds(), { padding: [20, 20] });

      // Recenter-on-home button — clicking restores the initial
      // AOI-fit view without reloading the page. Sits in the
      // topleft control bar under Leaflet's zoom controls.
      const RecenterControl = L.Control.extend({
        onAdd: () => {
          const btn = L.DomUtil.create("button", "leaflet-bar leaflet-control skywatch-recenter");
          btn.title = "Recenter on home";
          btn.innerHTML = "🏠";
          L.DomEvent.disableClickPropagation(btn);
          btn.onclick = () => {
            map.fitBounds(radiusCircle.getBounds(), { padding: [20, 20] });
          };
          return btn;
        },
      });
      new RecenterControl({ position: "topleft" }).addTo(map);

      // Populate legend silhouettes
      for (const [cat, svg] of Object.entries(CATEGORY_SVG)) {
        const slug = cat.replace(/_/g, "-");
        const el = document.getElementById("leg-" + slug);
        if (el) el.innerHTML = svg;
      }
    }

    function trackFor(id) {
      let t = tracks.get(id);
      if (!t) { t = {}; tracks.set(id, t); }
      return t;
    }

    function upsertAircraft(feature) {
      const id = feature.id || feature.properties.flight_id || feature.properties.callsign;
      if (!id) return null;
      const [lon, lat] = feature.geometry.coordinates;
      const p = feature.properties || {};
      const heading = Number(p.heading) || 0;
      const category = aircraftCategory(p);
      const svg = svgForCategory(category);
      const cls = altClass(p.altitude_ft, category);
      const label = p.callsign || p.flight_number || "";

      const html = `<div class="plane-marker">
                      <div class="plane-icon ${cls}" style="transform: rotate(${heading}deg);">${svg}</div>
                      <div class="plane-label">${label}</div>
                    </div>`;
      const icon = L.divIcon({
        html,
        iconSize: [60, 44],
        iconAnchor: [30, 14],
        className: "",
      });

      const track = trackFor(id);
      if (!track.marker) {
        track.marker = L.marker([lat, lon], { icon, riseOnHover: true })
          .addTo(map)
          .bindTooltip(tooltipHtml(p), { className: "sky-tip", direction: "top", offset: [0, -8] });
      } else {
        track.marker.setLatLng([lat, lon]);
        track.marker.setIcon(icon);
        track.marker.setTooltipContent(tooltipHtml(p));
      }
      track.category = category;
      // Sync trail color if a trail exists
      if (track.trailLine) {
        track.trailLine.setStyle({ color: trailColorFor(category, p.altitude_ft) });
      }
      return id;
    }

    function trailColorFor(category, altFt) {
      if (category === "watch") return "#ab47bc";
      if (category === "helo") return "#ffb74d";
      const a = Number(altFt) || 0;
      if (a < 10000) return "#ef5350";
      if (a < 20000) return "#ff9800";
      if (a < 30000) return "#ffeb3b";
      if (a < 40000) return "#4fc3f7";
      return "#1976d2";
    }

    function upsertTrail(feature) {
      const id = feature.properties && feature.properties.trail_for;
      if (!id) return;
      const coords = feature.geometry.coordinates;
      if (!coords || coords.length < 2) return;
      const latlngs = coords.map(([ln, lt]) => [lt, ln]);
      const track = trackFor(id);
      const color = trailColorFor(track.category || (feature.properties.is_helo ? "helo" : "jet"), 0);

      if (!track.trailLine) {
        track.trailLine = L.polyline(latlngs, {
          color,
          weight: 2,
          opacity: 0.55,
          interactive: false,
        }).addTo(map);
      } else {
        track.trailLine.setLatLngs(latlngs);
      }
    }

    function pruneRemovedTracks(seenIds) {
      for (const [id, track] of tracks.entries()) {
        if (!seenIds.has(id)) {
          if (track.marker) map.removeLayer(track.marker);
          if (track.trailLine) map.removeLayer(track.trailLine);
          tracks.delete(id);
        }
      }
    }

    async function tick() {
      const statusEl = document.getElementById("status");
      try {
        const resp = await fetch(GEOJSON_URL, { credentials: "same-origin" });
        if (!resp.ok) throw new Error("HTTP " + resp.status);
        const data = await resp.json();
        if (data.home && data.radius_m != null) {
          ensureMap(data.home, data.radius_m, data.audible_radius_m || 0);
        }
        if (!map) {
          statusEl.textContent = "skywatch unconfigured";
          return;
        }

        const features = data.features || [];
        const seenIds = new Set();
        let aircraftCount = 0;

        for (const f of features) {
          if (!f || !f.geometry) continue;
          if (f.geometry.type === "Point") {
            const id = upsertAircraft(f);
            if (id) seenIds.add(id);
            aircraftCount++;
          }
        }
        for (const f of features) {
          if (f && f.geometry && f.geometry.type === "LineString") {
            upsertTrail(f);
          }
        }
        pruneRemovedTracks(seenIds);

        const now = new Date();
        const hh = String(now.getHours()).padStart(2, "0");
        const mm = String(now.getMinutes()).padStart(2, "0");
        statusEl.textContent = `${aircraftCount} aircraft · ${hh}:${mm}`;
      } catch (err) {
        statusEl.textContent = "error: " + err.message;
      }
    }

    tick();
    setInterval(tick, REFRESH_MS);
  </script>
</body>
</html>
