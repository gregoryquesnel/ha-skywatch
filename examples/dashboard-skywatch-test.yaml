# Minimal test dashboard for Skywatch — deploy via:
#   mise run deploy:test-dashboard
#
# Renders the data Playwright assertions need to pin. v0.2 adds hour-of-day
# histogram, top-routes bar chart, rare aircraft, and a sightings table with
# FlightAware + Wikipedia anchor links — all reading data the sensors already
# expose in attributes.
views:
  - title: Skywatch Test
    path: skywatch-test
    icon: mdi:airplane
    type: sections
    max_columns: 3
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Skywatch counts
            heading_style: title
          - type: tile
            entity: sensor.skywatch_sightings_today
            name: Sightings today
            icon: mdi:calendar-today
          - type: tile
            entity: sensor.skywatch_sightings_this_week
            name: Sightings this week
            icon: mdi:calendar-week
          - type: tile
            entity: sensor.skywatch_sightings_all_time
            name: Sightings all-time
            icon: mdi:database
          - type: tile
            entity: sensor.skywatch_overhead_sightings
            name: Overhead transits
            icon: mdi:airplane
          - type: tile
            entity: sensor.skywatch_military_sightings
            name: Military sightings
            icon: mdi:airplane-shield
          - type: tile
            entity: sensor.skywatch_airport_movements_today
            name: Airport movements today
            icon: mdi:airport
          - type: tile
            entity: sensor.skywatch_aircraft_in_area
            name: Aircraft in area now
            icon: mdi:radar

      - type: grid
        cards:
          - type: heading
            heading: Sky Pulse
            heading_style: title
          - type: tile
            entity: sensor.skywatch_active_last_1h
            name: Active last 1h
            icon: mdi:clock-outline
            color: lime
          - type: tile
            entity: sensor.skywatch_active_last_24h
            name: Active last 24h
            icon: mdi:clock-time-eight-outline
            color: lime

      - type: grid
        cards:
          - type: heading
            heading: Skywatch state
            heading_style: title
          - type: tile
            entity: binary_sensor.skywatch_aircraft_present
            name: Aircraft present
            icon: mdi:airplane
          - type: tile
            entity: binary_sensor.skywatch_helicopter_overhead
            name: Helicopter overhead
            icon: mdi:helicopter

      - type: grid
        cards:
          - type: heading
            heading: Live map
            heading_style: title
          - type: iframe
            url: /api/skywatch/map
            grid_options:
              columns: full
              rows: 8

      - type: grid
        cards:
          - type: heading
            heading: In-area carousel
            heading_style: title
          - type: custom:flightradar-flight-card
            entities:
              - entity_id: sensor.flightradar24_current_in_area
                title: In Area Now
              - entity_id: sensor.flightradar24_entered_area
                title: Just Entered
              - entity_id: sensor.flightradar24_exited_area
                title: Just Exited
              - entity_id: sensor.flightradar24_additional_tracked
                title: Tracked
            units:
              altitude: ft
              distance: km
              ground_speed: kmh
            show_flightradar_link: true
            show_airline_info_column: true
            show_airline_logo: true
            show_aircraft_photo: true
            show_progress_bar: true
            carousel:
              enable: true
              show_controls: true
              loop: true
            grid_options:
              columns: full

      - type: grid
        cards:
          - type: heading
            heading: Hour-of-day distribution
            heading_style: title
          - type: markdown
            content: |-
              {%- set _ = now() -%}
              {%- set buckets = state_attr('sensor.skywatch_sightings_hour_of_day', 'buckets') or [] -%}
              {%- set max_n = state_attr('sensor.skywatch_sightings_hour_of_day', 'max_n') | int(0) -%}
              **🕐 Hour-of-day** <span style="opacity:0.6;">(local time, lifetime)</span>

              {% if max_n == 0 -%}
              _no sightings yet — populates on next 30 min scan._
              {%- else -%}
              ```
              {% for b in buckets -%}
              {{ '%02d' | format(b.hour) }}h {{ '█' * ((b.n / max_n) * 16) | int }}{{ '░' * (16 - ((b.n / max_n) * 16) | int) }} {{ b.n }}
              {% endfor -%}
              ```
              {%- endif %}
            grid_options:
              columns: full
              rows: auto

      - type: grid
        cards:
          - type: heading
            heading: Top routes
            heading_style: title
          - type: markdown
            content: |-
              {%- set _ = now() -%}
              {%- set rows = state_attr('sensor.skywatch_top_routes', 'routes') or [] -%}
              {%- if rows | length == 0 -%}
              **Top routes** _no routes yet — sensor populates on next 30 min scan._
              {%- else -%}
              {%- set max_n = rows[0].n -%}
              **Top routes** <span style="opacity:0.6;">(lifetime)</span>
              {% for r in rows[:8] -%}
              {%- set bar_len = ((r.n / max_n) * 8) | int -%}
              - `{{ r.origin_iata }}→{{ r.destination_iata }}` {{ '█' * bar_len }}{{ '░' * (8 - bar_len) }} {{ r.n }}
              {% endfor %}
              {%- endif -%}
            grid_options:
              columns: full

      - type: grid
        cards:
          - type: heading
            heading: Rare aircraft
            heading_style: title
          - type: markdown
            content: |
              **Rare aircraft** <span style="opacity:0.6;">(seen once)</span>
              {% for a in (state_attr('sensor.skywatch_sightings_all_time','rare_aircraft') or [])[:8] -%}
              - <a href="https://en.wikipedia.org/wiki/Special:Search?search={{ a.aircraft_model | urlencode }}" target="_blank">{{ a.aircraft_model }}</a>
              {% endfor %}
              {% if (state_attr('sensor.skywatch_sightings_all_time','rare_aircraft') or []) | length == 0 -%}
              _no rare aircraft yet — populates as sightings accumulate._
              {%- endif %}
            grid_options:
              columns: full

      - type: grid
        cards:
          - type: heading
            heading: Recent sightings
            heading_style: title
          - type: markdown
            content: |
              {% set rows = state_attr('sensor.skywatch_recent_sightings','sightings') or [] %}
              {% set page = state_attr('sensor.skywatch_recent_sightings','page') or 1 %}
              {% set total_pages = state_attr('sensor.skywatch_recent_sightings','total_pages') or 1 %}
              {% set total_count = state_attr('sensor.skywatch_recent_sightings','total_count') or 0 %}
              **Page {{ page }} of {{ total_pages }}** — {{ total_count }} total sightings

              | When (local) | ✈ | Flight | Aircraft | Route | Alt | Dist | Dwell |
              |--------------|---|--------|----------|-------|-----|------|-------|
              {%- for f in rows[:10] %}
              {%- set cs = f.callsign or f.flight_number %}
              {%- set photo = f.aircraft_photo or '' %}
              {#- JetPhotos thumbnail (/200/.../_tb.jpg) → full-resolution
                  JPG (/full/.../.jpg). Verified empirically; non-JetPhotos
                  URLs fall through unchanged. Storage layer's
                  normalize_photo_url has already stripped the legacy
                  'https:https://' doubled-prefix bug at insert time, so
                  we only need the size transformation here. -#}
              {%- set photo_full = photo | replace('/200/', '/full/') | replace('_tb.jpg', '.jpg') if 'cdn.jetphotos.com/200/' in photo else photo %}
              | {{ f.exit_time_local or '—' }} | {% if photo %}<a href="{{ photo_full }}" target="_blank"><img src="{{ photo }}" width="160"></a>{% endif %} | {% if cs %}**<a href="https://flightaware.com/live/flight/{{ cs | urlencode }}" target="_blank">{{ cs }}</a>** {{ f.airline_iata or '' }}{% else %}**?** {{ f.airline_iata or '' }}{% endif %} | {% if f.aircraft_info_url %}<a href="{{ f.aircraft_info_url }}" target="_blank">{{ f.aircraft_code or '?' }}</a>{% else %}{{ f.aircraft_code or '?' }}{% endif %} | {{ f.origin_iata or '—' }}→{{ f.destination_iata or '—' }} | {% if f.altitude_ft %}FL{{ (f.altitude_ft / 100) | int }}{% else %}—{% endif %} | {% if f.closest_km %}{{ f.closest_km | round(1) }} km{% else %}—{% endif %} | {% if f.dwell_seconds %}{% if f.dwell_seconds < 60 %}{{ f.dwell_seconds }}s{% else %}{{ (f.dwell_seconds / 60) | round(0, 'floor') | int }}m{% endif %}{% else %}—{% endif %} |
              {%- endfor %}
              {% if not rows %}_no sightings yet — capture is event-driven, first row lands when an aircraft exits the watch radius._{% endif %}
            grid_options:
              columns: full
