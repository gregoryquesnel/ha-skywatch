[tools]
python = "3.12"

[env]
_.python.venv = { path = ".venv", create = true }

[tasks.setup]
description = "Install development dependencies into .venv"
run = "pip install -U pip pytest pytest-asyncio ruff"

[tasks.setup-ha]
description = "Install pytest-homeassistant-custom-component (for HA-dependent tests, later)"
run = "pip install pytest-homeassistant-custom-component"

[tasks.test]
description = "Run unit tests"
run = "pytest tests/unit -v"

[tasks.test-all]
description = "Run the full test suite"
run = "pytest tests -v"

[tasks.cov]
description = "Run tests with coverage report"
run = "pytest tests --cov=custom_components/skywatch --cov-report=term-missing"

[tasks.lint]
description = "Run ruff lint + format check"
run = ["ruff check custom_components tests", "ruff format --check custom_components tests"]

[tasks.lint-fix]
description = "Apply ruff fixes + formatting"
run = ["ruff check --fix custom_components tests", "ruff format custom_components tests"]

[tasks.install]
description = "Install ha-skywatch into the live HA (SCP + restart)"
run = "scripts/install-to-ha.sh"

[tasks."install:dry-run"]
description = "Preview what install would copy without changing anything"
run = "scripts/install-to-ha.sh --dry-run"

[tasks.uninstall]
description = "Remove ha-skywatch from the live HA (after deleting the config entry in the UI)"
run = "scripts/uninstall-from-ha.sh"

[tasks.smoke]
description = "HTTP smoke checks against the live HA (requires HA_TOKEN)"
run = "scripts/smoke.sh"

[tasks."deploy:test-dashboard"]
description = "Deploy the skywatch-test dashboard via WebSocket"
run = "python scripts/deploy-test-dashboard.py"

[tasks."delete:test-dashboard"]
description = "Remove the skywatch-test dashboard"
run = "python scripts/delete-test-dashboard.py"

[tasks."setup:browser"]
description = "Install Playwright + Chromium (~500 MB) for verify:browser"
dir = "scripts/browser"
run = ["npm install", "npx playwright install chromium"]

[tasks."verify:browser"]
description = "Playwright smoke test against the deployed skywatch-test dashboard"
dir = "scripts/browser"
run = "node verify-skywatch-dashboard.mjs"
